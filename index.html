<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>Finance Dashboard</title>
    
    <!-- PWA & iOS Tags -->
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/apple-icon-180.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FERP">
    <style>
      :root {
        color-scheme: light;
        --bootstrap-bg: #f6f7fb;
        --bootstrap-surface: rgba(255, 255, 255, 0.88);
        --bootstrap-text: #667085;
        --bootstrap-accent: #0f9f6e;
        --bootstrap-accent-soft: rgba(15, 159, 110, 0.18);
        --bootstrap-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(15, 159, 110, 0.08), transparent 36%),
          linear-gradient(180deg, #fbfcfe 0%, var(--bootstrap-bg) 100%);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #app-bootstrap {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      #app-bootstrap.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .bootstrap-card {
        width: min(360px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 28px 24px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        border-radius: 24px;
        background: var(--bootstrap-surface);
        box-shadow: var(--bootstrap-shadow);
        backdrop-filter: blur(10px);
      }

      .bootstrap-spinner {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background:
          radial-gradient(farthest-side, var(--bootstrap-accent) 94%, transparent) top/10px 10px no-repeat,
          conic-gradient(transparent 30%, var(--bootstrap-accent));
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 0);
        mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 0);
        animation: bootstrap-rotate 1s linear infinite;
      }

      .bootstrap-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
      }

      .bootstrap-title {
        font-size: 16px;
        font-weight: 600;
        color: #101828;
      }

      .bootstrap-subtitle {
        max-width: 260px;
        font-size: 14px;
        line-height: 1.5;
        color: var(--bootstrap-text);
      }

      .bootstrap-pulse {
        width: 96px;
        height: 8px;
        border-radius: 999px;
        background:
          linear-gradient(90deg, transparent, var(--bootstrap-accent-soft), transparent);
        background-size: 200% 100%;
        animation: bootstrap-shimmer 1.2s ease-in-out infinite;
      }

      @keyframes bootstrap-rotate {
        to {
          transform: rotate(1turn);
        }
      }

      @keyframes bootstrap-shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-bootstrap" aria-live="polite" aria-busy="true">
      <div class="bootstrap-card">
        <div class="bootstrap-spinner"></div>
        <div class="bootstrap-text">
          <div class="bootstrap-title">Завантаження застосунку</div>
          <div class="bootstrap-subtitle">
            Підтягуємо інтерфейс, налаштування та дані сесії.
          </div>
        </div>
        <div class="bootstrap-pulse"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
